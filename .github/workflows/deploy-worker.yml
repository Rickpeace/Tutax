name: Deploy video-worker (Hetzner)

# Automatischer Deploy des video-workers auf den Hetzner-Server.
# Laeuft bei jedem Push auf main, der video-worker/ aendert — und manuell per Button
# ("Run workflow"). GitHub fuehrt den Deploy aus (nicht ein Agent), daher keine
# Berechtigungs-Sperre.
#
# Einmalige Einrichtung (siehe video-worker/DEPLOY.md):
#   1) Deploy-Key beim tutax-Nutzer hinterlegen (authorized_keys).
#   2) Privaten Deploy-Key als GitHub-Secret HETZNER_SSH_KEY anlegen.

on:
  push:
    branches: [main]
    paths:
      - "video-worker/**"
      - "!video-worker/**.md"
  workflow_dispatch: {}

concurrency:
  group: deploy-video-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: "23.88.98.172"
          USER_NAME: "tutax"
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "::error::Secret HETZNER_SSH_KEY fehlt. Siehe video-worker/DEPLOY.md."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes "$USER_NAME@$HOST" '
            set -e
            cd /opt/tutax
            git pull --ff-only
            cd video-worker && npm install --omit=dev --no-audit --no-fund
            pm2 restart video-worker
            pm2 save
            echo "Deploy fertig: $(git -C /opt/tutax rev-parse --short HEAD)"
          '
